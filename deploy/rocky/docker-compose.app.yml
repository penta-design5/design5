# Next(standalone) + Nginx — 데이터 평면 docker-compose.yml 위에 오버레이
#   cd deploy/rocky
#   cp .env.app.example .env.app   # 비밀·URL 수정 (아래 .env와 자격을 맞출 것)
#   docker compose -f docker-compose.yml -f docker-compose.app.yml --env-file .env up -d --build
#
# HTTP만(기본): Nginx 8080 → Next 3000. TLS·도메인은 nginx/next-app-https.conf.sample 참고
# Nginx가 노출하는 포트: .env에 NGINX_HTTP_PORT(기본 8080), NGINX_BIND(기본 127.0.0.1)

services:
  app:
    build:
      context: ../..
      dockerfile: deploy/rocky/Dockerfile
      # next build 는 호스트에 노출된 Postgres( docker-compose.yml 의 5432 )에 붙어야 함
      # ① docker compose -f docker-compose.yml --env-file .env up -d 로 DB 먼저 기동
      # ② 그 뒤 이 파일로 build / up
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        BUILD_DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB}?schema=public&connection_limit=5"
        BUILD_DIRECT_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB}?schema=public"
    container_name: design5-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env.app
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: design5-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${NGINX_BIND:-127.0.0.1}:${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/app-http.conf:/etc/nginx/conf.d/default.conf:ro
